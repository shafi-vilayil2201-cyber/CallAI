version: '3.8'

services:
  # ─── PostgreSQL Database ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: callai-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: callai
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (BullMQ Queues) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: callai-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── CallAI Application ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: callai-app
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/callai?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-16-chars}
      JWT_EXPIRATION: 24h
      VOICE_GATEWAY_TOKEN: ${VOICE_GATEWAY_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:3000}
      # AWS S3 (optional)
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_RECORDINGS_BUCKET: ${AWS_S3_RECORDINGS_BUCKET:-call-ai-recordings}
      # Exotel (optional)
      EXOTEL_API_KEY: ${EXOTEL_API_KEY:-}
      EXOTEL_API_TOKEN: ${EXOTEL_API_TOKEN:-}
      EXOTEL_ACCOUNT_SID: ${EXOTEL_ACCOUNT_SID:-}
      EXOTEL_SUBDOMAIN: ${EXOTEL_SUBDOMAIN:-api.exotel.com}
      EXOTEL_CALLER_ID: ${EXOTEL_CALLER_ID:-}
      # Twilio (optional)
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_NUMBER: ${TWILIO_NUMBER:-}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
